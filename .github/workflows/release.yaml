name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
env:
  GO_VERSION: "1.26.x"

permissions:
  contents: write
  packages: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release-image:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Version
        id: version
        run: |
          version="${GITHUB_REF#refs/tags/}"
          echo "version=$version" >> $GITHUB_OUTPUT

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          registry: "ghcr.io"
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - run: docker context create builders

      - uses: docker/setup-buildx-action@v4
        with:
          version: latest
          endpoint: builders

      - name: Image Release
        run: make push-stdio VERSION=${{ steps.version.outputs.version }}

  build-binaries:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')

    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
        exclude:
          - goos: windows
            goarch: arm64

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Version
        id: version
        run: |
          version="${GITHUB_REF#refs/tags/}"
          echo "version=$version" >> $GITHUB_OUTPUT

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Go Build
        run: |
          mkdir -p releases
          version="${{ steps.version.outputs.version }}"
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -ldflags="-X 'github.com/teamwork/mcp/internal/config.Version=$version'" -o releases/tw-mcp-${{ matrix.goos }}-${{ matrix.goarch }} ./cmd/mcp-stdio

      - name: Upload binaries artifact
        uses: actions/upload-artifact@v7
        with:
          name: mcp-binaries-${{ matrix.goos }}-${{ matrix.goarch }}
          path: releases/tw-mcp-${{ matrix.goos }}-${{ matrix.goarch }}

  release-binaries:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: ["build-binaries"]

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          fetch-tags: true
          fetch-depth: 0
          ref: ${{ github.ref }}

      - name: Download all binaries artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: mcp-binaries-*
          path: releases
          merge-multiple: true

      - name: Version
        id: version
        run: |
          version="${GITHUB_REF#refs/tags/}"
          echo "version=$version" >> $GITHUB_OUTPUT

      - name: Package release archives and checksums
        run: |
          set -euo pipefail

          version="${{ steps.version.outputs.version }}"
          version_no_v="${version#v}"
          dist_dir="releases/dist"

          mkdir -p "$dist_dir"

          for bin in releases/tw-mcp-*; do
            name="$(basename "$bin")"
            target="${name#tw-mcp-}"
            goos="${target%-*}"
            goarch="${target##*-}"

            if [ "$goos" = "windows" ]; then
              cp "$bin" "$dist_dir/tw-mcp.exe"
              (cd "$dist_dir" && zip -q "tw-mcp_${version_no_v}_${goos}_${goarch}.zip" tw-mcp.exe)
              rm -f "$dist_dir/tw-mcp.exe"
            else
              cp "$bin" "$dist_dir/tw-mcp"
              (cd "$dist_dir" && tar -czf "tw-mcp_${version_no_v}_${goos}_${goarch}.tar.gz" tw-mcp)
              rm -f "$dist_dir/tw-mcp"
            fi
          done

          (cd "$dist_dir" && sha256sum tw-mcp_* > checksums.txt)

      - name: Previous Tag
        id: previous-tag
        run: |
          current_tag="${GITHUB_REF#refs/tags/}"
          tag=$(git tag --sort=-version:refname | grep -A1 "^${current_tag}$" | tail -n1 || echo "")
          if [ "$tag" = "$current_tag" ]; then
            tag=""
          fi
          echo "tag=$tag" >> $GITHUB_OUTPUT

      - name: Create Release
        run: |
          version="${{ steps.version.outputs.version }}"
          gh release create $version \
            --fail-on-no-commits \
            --generate-notes \
            ${{ steps.previous-tag.outputs.tag != '' && format('--notes-start-tag {0}', steps.previous-tag.outputs.tag) || '' }} \
            --verify-tag \
            releases/dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-homebrew:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: ["release-binaries"]

    steps:
      - name: Version
        id: version
        run: |
          version="${GITHUB_REF#refs/tags/}"
          version_no_v="${version#v}"
          echo "version=$version" >> $GITHUB_OUTPUT
          echo "version_no_v=$version_no_v" >> $GITHUB_OUTPUT

      - name: Download darwin release archives
        run: |
          set -euo pipefail
          mkdir -p dist
          gh release download "${{ steps.version.outputs.version }}" \
            --repo "${GITHUB_REPOSITORY}" \
            --pattern "tw-mcp_${{ steps.version.outputs.version_no_v }}_darwin_*.tar.gz" \
            --dir dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute Homebrew checksums
        id: checksums
        run: |
          set -euo pipefail
          amd64_archive="dist/tw-mcp_${{ steps.version.outputs.version_no_v }}_darwin_amd64.tar.gz"
          arm64_archive="dist/tw-mcp_${{ steps.version.outputs.version_no_v }}_darwin_arm64.tar.gz"

          sha_amd64="$(sha256sum "$amd64_archive" | awk '{print $1}')"
          sha_arm64="$(sha256sum "$arm64_archive" | awk '{print $1}')"

          echo "sha_amd64=$sha_amd64" >> "$GITHUB_OUTPUT"
          echo "sha_arm64=$sha_arm64" >> "$GITHUB_OUTPUT"

      - name: Clone Homebrew tap
        run: |
          set -euo pipefail
          git clone "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" tap
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Homebrew formula
        env:
          VERSION: ${{ steps.version.outputs.version }}
          VERSION_NO_V: ${{ steps.version.outputs.version_no_v }}
          SHA_AMD64: ${{ steps.checksums.outputs.sha_amd64 }}
          SHA_ARM64: ${{ steps.checksums.outputs.sha_arm64 }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          mkdir -p tap/Formula

          cat > tap/Formula/tw-mcp.rb <<EOF
          class TwMcp < Formula
            desc "Teamwork.com MCP server"
            homepage "https://github.com/${REPO}"
            version "${VERSION_NO_V}"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/${REPO}/releases/download/${VERSION}/tw-mcp_${VERSION_NO_V}_darwin_arm64.tar.gz"
                sha256 "${SHA_ARM64}"
              else
                url "https://github.com/${REPO}/releases/download/${VERSION}/tw-mcp_${VERSION_NO_V}_darwin_amd64.tar.gz"
                sha256 "${SHA_AMD64}"
              end
            end

            def install
              bin.install "tw-mcp"
            end

            test do
              assert_match "Usage", shell_output("#{bin}/tw-mcp -h", 2)
            end
          end
          EOF

      - name: Commit and push formula branch
        id: formula-branch
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --quiet; then
            echo "No Homebrew formula changes detected"
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          branch="chore/homebrew-tw-mcp-${VERSION}"
          git checkout -B "$branch"
          git add Formula/tw-mcp.rb
          git commit -m "tw-mcp ${VERSION}"
          git push --force-with-lease origin "$branch"
          echo "changed=true" >> "$GITHUB_OUTPUT"
          echo "branch=$branch" >> "$GITHUB_OUTPUT"

      - name: Create or update pull request
        if: steps.formula-branch.outputs.changed == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
          BASE_REF: ${{ github.event.repository.default_branch }}
          BRANCH: ${{ steps.formula-branch.outputs.branch }}
        run: |
          set -euo pipefail

          existing_pr="$(gh pr list --repo "${GITHUB_REPOSITORY}" --head "$BRANCH" --base "$BASE_REF" --state open --json number --jq '.[0].number')"
          if [ -n "$existing_pr" ]; then
            echo "PR #$existing_pr already exists for $BRANCH"
            exit 0
          fi

          gh pr create \
            --repo "${GITHUB_REPOSITORY}" \
            --base "$BASE_REF" \
            --head "$BRANCH" \
            --title "chore: update Homebrew formula for ${VERSION}" \
            --body "Automated Homebrew formula update for ${VERSION}."
